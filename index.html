<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>InvCode29 | Professional Videography & Photography</title>
    <meta name="description" content="Premium visual storytelling and cinematic production by James. Specialized in high-end videography and professional photography." />
    <meta name="author" content="InvCode29" />

    <meta property="og:title" content="InvCode29 Portfolio" />
    <meta property="og:description" content="Cinematic showreels and professional media production." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/portfolioscreenshot.png" />

    <script type="text/javascript">
      // 1. Disable Right Click
      document.addEventListener('contextmenu', event => event.preventDefault());

      // 2. Disable F12 and Inspect Shortcuts
      document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U (View Source)
      };
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
